model:
  name: "philschmid/layoutlm-funsd"
  max_seq_length: 512

dataset:
  name: "nielsr/funsd-layoutlmv3" # We will use a standard FUNSD dataset
  train_samples: 20  # Very small subset for CPU training
  test_samples: 5

training:
  batch_size: 2
  learning_rate: 5e-5
  num_epochs: 1
  device: "cpu" # Default to CPU as requested

serve:
  host: "0.0.0.0"
  port: 8000
